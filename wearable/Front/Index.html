<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymBro AI — Rep Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05060f;
    --surface: #0c0e1a;
    --card: #0f1120;
    --border: #1a1f3a;
    --cyan: #00cfff;
    --cyan-dim: rgba(0,207,255,0.12);
    --orange: #ff6a00;
    --orange-dim: rgba(255,106,0,0.12);
    --purple: #8b5cf6;
    --purple-dim: rgba(139,92,246,0.1);
    --text: #e8eaf6;
    --muted: #4a5080;
    --glow-cyan: rgba(0,207,255,0.25);
    --glow-orange: rgba(255,106,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
    overflow-x: hidden;
  }

  /* Animated starfield bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(0,207,255,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(139,92,246,0.05) 0%, transparent 50%),
      radial-gradient(circle at 60% 10%, rgba(255,106,0,0.03) 0%, transparent 40%),
      linear-gradient(rgba(0,207,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,207,255,0.02) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 1140px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 44px;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 220px; height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    box-shadow: 0 0 12px var(--cyan);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo-img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 0 16px rgba(0,207,255,0.5));
  }


  .header-titles h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(38px, 5vw, 64px);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--text);
  }

  .header-titles h1 .gym { color: var(--text); }
  .header-titles h1 .bro { color: var(--cyan); text-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,207,255,0.3); }
  .header-titles h1 .ai  {
    color: var(--orange);
    text-shadow: 0 0 30px var(--orange), 0 0 60px rgba(255,106,0,0.3);
    font-size: 0.7em;
    vertical-align: middle;
    margin-left: 6px;
  }

  .header-titles p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .reset-all {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .reset-all:hover {
    border-color: var(--orange);
    color: var(--orange);
    box-shadow: 0 0 12px var(--orange-dim);
  }
  

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(196px, 1fr));
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.5s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Cyan top glow line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  /* Corner accent */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 40px; height: 40px;
    background: linear-gradient(135deg, transparent 50%, rgba(0,207,255,0.05) 50%);
    transition: all 0.3s;
  }

  .card:hover::before { opacity: 1; }
  .card:hover { border-color: #252b50; background: #111528; }

  .card.active {
    background: #0d1225;
    border-color: #1e2a50;
    box-shadow: 0 0 30px rgba(0,207,255,0.04), inset 0 0 30px rgba(0,207,255,0.02);
  }

  .card.active::before { opacity: 1; }

  /* Card top row */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .exercise-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .exercise-icon {
    font-size: 18px;
    opacity: 0.5;
    transition: all 0.2s;
    filter: drop-shadow(0 0 4px var(--cyan));
  }

  .card:hover .exercise-icon { opacity: 1; transform: scale(1.2); }

  /* Name */
  .exercise-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  /* Rep display */
  .rep-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 76px;
    line-height: 1;
    color: var(--cyan);
    letter-spacing: -2px;
    text-shadow: 0 0 20px rgba(0,207,255,0.3);
    transition: all 0.15s;
    margin: 10px 0 2px;
  }

  .rep-display.bump {
    transform: scale(1.1);
    text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,207,255,0.4);
    color: #fff;
  }

  .rep-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    overflow: hidden;
    border-radius: 2px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--cyan);
    border-radius: 2px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 6px;
    margin-top: auto;
  }

  .btn {
    flex: 1;
    height: 40px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    border-radius: 1px;
  }

  .btn:active { transform: scale(0.93); }

  .btn-reset { font-size: 13px; }
  .btn-reset:hover { 
    border-color: var(--orange);
    color: var(--orange);
    box-shadow: 0 0 12px var(--orange-dim);
  } 

  /* Bottom bar */
  footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
  }

  footer::before {
    content: '';
    position: absolute;
    top: -1px; right: 0;
    width: 180px; height: 1px;
    background: linear-gradient(270deg, var(--orange), transparent);
  }

  .footer-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: 1px;
  }

  .stat-value.highlight {
    color: var(--orange);
    text-shadow: 0 0 12px var(--orange-dim);
  }

  .timestamp {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
</style>
</head>

      <div class="header-titles">
        <h1><span class="gym">GYM</span><span class="bro">BRO</span><span class="ai">AI</span></h1>
        <p>Rep Tracker</p>
      </div>
    </div>
    <div class="header-right">
      <button class="reset-all" onclick="resetAll()">↺ Reset All</button>
    </div>
  </header>

  <div class="grid" id="exerciseGrid"></div>

  <footer>
    <div class="footer-stats">
    </div>
    <div class="heartbeat">
      <svg class="hb-line" viewBox="0 0 80 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      
      </svg>
    </div>
  </footer>

</div>

<script>
const exercises = [
  { name: "Squats",           icon: "🦵", goal: 12 },
  { name: "Bicep Curls",      icon: "💪", goal: 12 },
  { name: "Rows",             icon: "🚣", goal: 12 },
  { name: "Shoulder Press",   icon: "🏋️", goal: 12 },
  { name: "Tricep Ext.",      icon: "⚡", goal: 12 },
];

let reps = [0, 0, 0, 0, 0];
let totalTaps = 0;

function render() {
  const grid = document.getElementById('exerciseGrid');
  grid.innerHTML = '';
  exercises.forEach((ex, i) => {
    const pct = Math.min(100, Math.round((reps[i] / ex.goal) * 100));
    const isActive = reps[i] > 0;
    grid.innerHTML += `
      <div class="card ${isActive ? 'active' : ''}" id="card-${i}">
        <div class="card-top">
          <span class="exercise-num">EX.0${i+1}</span>
          <span class="exercise-icon">${ex.icon}</span>
        </div>
        <div class="exercise-name">${ex.name}</div>
        <div class="rep-display" id="repCount-${i}">${reps[i]}</div>
        <div class="rep-label">reps</div>
        <div class="progress-row">
          <div class="progress-bar">
            <div class="progress-fill" id="bar-${i}" style="width:${pct}%"></div>
          </div>
          <span class="progress-label">${pct} / ${ex.goal}</span>
        </div>
        <div class="controls">
          <button class="btn btn-reset btn-sub" onclick="resetOne(${i})" title="Reset">↺</button>
        </div>
      </div>`;
  });
  updateStats();
}

function changeRep(i, delta) {
  reps[i] = Math.max(0, reps[i] + delta);
  if (delta > 0) totalTaps++;

  const el   = document.getElementById(`repCount-${i}`);
  const bar  = document.getElementById(`bar-${i}`);
  const card = document.getElementById(`card-${i}`);
  const pct  = Math.min(100, Math.round((reps[i] / exercises[i].goal) * 100));

  el.textContent = reps[i];
  if (bar) bar.style.width = pct + '%';

  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);

  card.classList.remove('pulse');
  void card.offsetWidth;
  card.classList.add('pulse');
  setTimeout(() => card.classList.remove('pulse'), 450);

  card.classList.toggle('active', reps[i] > 0);
  updateStats();
}

function resetOne(i) { reps[i] = 0; }

function resetAll() { reps = [0,0,0,0,0]; totalTaps = 0; render(); }

function updateStats() {
  const total = reps.reduce((a,b) => a+b, 0);
  document.getElementById('totalCount').textContent = total;
  const done = reps.filter(r => r > 0).length;
  document.getElementById('statDone').textContent = `${done} / 5`;
  document.getElementById('statSets').textContent = totalTaps;
  const maxIdx = reps.indexOf(Math.max(...reps));
  document.getElementById('statLeader').textContent =
    reps[maxIdx] > 0 ? exercises[maxIdx].name : '—';
}
render();
</script>
</body>
